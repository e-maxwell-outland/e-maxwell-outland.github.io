title: Emily Maxwell Outland
email: emily.maxwell@colorado.edu
description: >-
  Graduate researcher at CU Boulder working on explainable AI,
  human-machine teaming, and bioastronautics.
url: "https://emilymaxwellout.land"
baseurl: ""

theme: ~

markdown: kramdown
highlighter: rouge
permalink: /writing/:year-:month-:day-:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .github/
