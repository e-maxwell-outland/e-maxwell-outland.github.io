---
layout: default
---
<article class="post-content container">
  <header class="post-header">
    <span class="tag tag--{% if page.category == 'research' %}sage{% elsif page.category == 'note' %}mist{% else %}blossom{% endif %}">
      {{ page.category }}
    </span>
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%B %-d, %Y" }}
    </time>
  </header>

  {{ content }}

  <footer class="post-nav">
    <a href="{{ '/writing/' | relative_url }}" class="btn btn--ghost">&larr; Back to Writing</a>
  </footer>
</article>
